<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Ticket Line</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

<style>
html, body {
    height: 100%;
    margin: 0;
}

body {
    display: flex;
    flex-direction: column;
    min-height: 100vh;

    /* Background image */
    background: url("{{ url_for('static', filename='img/photo_2026-04-03_21-59-47.jpg') }}") no-repeat center center/cover;
}

/* Push content to take available space */
.container {
    flex: 1;
}

.btn-success{
    margin-top: 450px;
}

/* Optional: make footer slightly transparent */
footer {
    background: rgba(0, 0, 0, 0.8);
}

.btn-success {
    margin-top: 450px;
    animation: glow 2s infinite;

}

.glow-btn {
    margin-top: 450px;
    animation: glow 2s infinite;
}
/* Glow animation */
@keyframes glow {
    0% {
        box-shadow: 0 0 5px #28a745;
        transform: scale(1);
    }
    50% {
        box-shadow: 0 0 25px #28a745, 0 0 50px #28a745;
        transform: scale(1.05);
    }
    100% {
        box-shadow: 0 0 5px #28a745;
        transform: scale(1);
    }
}
</style>
</head>

<body>

<nav class="navbar navbar-dark bg-dark px-3">
    <a class="navbar-brand" href="/">Ticket Line</a>
 
<div class="d-flex gap-2">

    {% if session.get('user') or session.get('admin') %}
        <!-- Logged in → show ONLY logout -->
        <a href="{{ url_for('logout') }}" class="btn btn-danger">Logout</a>
    {% else %}
        <!-- Not logged in → show ONLY one login -->
        <a href="{{ url_for('login') }}" class="btn btn-primary">Login</a>
    {% endif %}

</div>
</nav>

<div class="container mt-4">
    <div class="d-flex justify-content-center">
    
    </div>

    {% block content %}{% endblock %}
</div>

<footer class="text-white text-center py-3">
    <p class="mb-0">© 2026 Ticket Line. All rights reserved.</p>
</footer>

</body>
</html>
