<!DOCTYPE html>
<html>
<head>
<title>Pay</title>
<script src="https://www.paypal.com/sdk/js?client-id=AfE7Dk_XHIdYcgq7Sy2rwmzQa9mgrj33TmRPh2FOtsAOF5557OmRM7A_OaGbYHT7xMegjPmkPbLfQyO1"></script>
</head>
<body>

<h2>Buy Ticket ($10)</h2>

<input type="email" id="email" placeholder="Enter email"><br><br>

<div id="paypal-button-container"></div>

<script>
paypal.Buttons({

createOrder: function() {
    return fetch('/create-order', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({amount: "10.00"})
    })
    .then(res => res.json())
    .then(data => data.id);
},

onApprove: function(data) {
    let email = document.getElementById("email").value;

    return fetch('/capture-order', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({
            orderID: data.orderID,
            email: email
        })
    })
    .then(res => res.json())
    .then(details => {
        alert("Ticket: " + details.ticket_code);
        window.location.href = "/tickets";
    });
}

}).render('#paypal-button-container');
</script>

</body>
</html>
